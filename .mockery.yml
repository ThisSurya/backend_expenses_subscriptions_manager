all: false
dir: '{{.InterfaceDir}}/mocks'
filename: '{{.InterfaceName}}_mock.go'
force-file-write: true
formatter: goimports
formatter-options:
  goimports:
    all-errors: false
    comments: true
    format-only: true
    fragment: false
    local-prefix: ""
    tab-indent: true
    tab-width: 8
generate: true
include-auto-generated: true
log-level: debug
structname: '{{.Mock}}{{.InterfaceName}}'
pkgname: '{{.SrcPackageName}}'
recursive: false
require-template-schema-exists: true
template: testify
template-schema: '{{.Template}}.schema.json'
packages:
  backend/repository:
    interfaces:
      UserRepository:
      ExpenseRepository:
      SubscriptionRepository:
      CategoryRepository:
    config:
      all: true
